<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="project.css">
        <link rel="icon" href="data:," />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Flight Booking</title>
    </head>
    <body>
        <h1>Travel Agency Booking and Comparison System</h1>
        <nav class="navbar">
            <div class="nav-links-desktop">
                <a href="index.html">Home</a>
                <a href="flights.html" class="active">Flights</a>
                <a href="accoms.html">Accommodation</a>
                <a href="booking_page.html">Compare Bookings</a>
                <a href="payment.html">Payment</a>
                <a href="account.html">Account</a>
            </div>
            
            <div class="menu-toggle" id="menu-toggle">☰</div>
            <div class="nav-links-mobile" id="nav-links-mobile">
                <a href="index.html">Home</a>
                <a href="flights.html" class="active">Flights</a>
                <a href="accoms.html">Accommodation</a>
                <a href="booking_page.html">Compare Bookings</a>
                <a href="payment.html">Payment</a>
                <a href="account.html">Account</a>
            </div>
        </nav>
        <h2>Flight Booking</h2>
        <div class="content">
            <form id="flightForm" class="entry_form" onsubmit="searchFlights(event)">
                <div class="entry-form-row">
                    <label>Origin
                        <input type="text" id="origin" value="LHR" required placeholder="Travelling From">
                    </label>
                    <label>Destination
                        <input type="text" id="destination" value="JFK" required placeholder="Travelling To">
                    </label>
                </div>
                <div class="entry-form-row">
                    <label>Departure Date
                        <input type="date" id="departureDate" value="2026-04-16" required>
                    </label>
                    <label>Return Date
                        <input type="date" id="returnDate" value="2026-04-30" required>
                    </label>
                </div>
                <div class="entry-form-row">
                    <label>Adults
                        <select id="adults">
                            <option value="1">1 Traveller</option>
                            <option value="2">2 Travellers</option>
                            <option value="3">3 Travellers</option>
                            <option value="4">4 Travellers</option>
                        </select>
                    </label>
                    <label>Cabin Class
                        <select id="cabin">
                            <option value="Economy">Economy</option>
                            <option value="Premium Economy">Premium Economy</option>
                            <option value="Business">Business</option>
                            <option value="First">First</option>
                        </select>
                    </label>
                    <label>Currency
                        <select id="currency">
                            <option value="GBP">GBP</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                        </select>
                    </label>
                </div>
                <button type="submit">Search Flights</button>
            </form>
        </div>

        

        <h2>Results:</h2>
        <div id="results"></div>

        <script src="project.js"></script>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="project.css">
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Travel Agency Booking and Comparison System</title>
    </head>
    <body>
        <h1>Travel Agency Booking and Comparison System</h1>
        <nav class="navbar">
            <div class="nav-links-desktop">
                <a href="home_page.html" class="active">Home</a>
                <a href="flights.html">Flights</a>
                <a href="accoms.html">Accommodation</a>
                <a href="booking_page.html">Compare Bookings</a>
                <a href="payment.html">Payment</a>
                <a href="account.html">Account</a>
            </div>
            
            <div class="menu-toggle" id="menu-toggle">☰</div>
            <div class="nav-links-mobile" id="nav-links-mobile">
                <a href="home_page.html" class="active">Home</a>
                <a href="flights.html">Flights</a>
                <a href="accoms.html">Accommodation</a>
                <a href="booking_page.html">Compare Bookings</a>
                <a href="payment.html">Payment</a>
                <a href="account.html">Account</a>
            </div>
        </nav>
        
        <a href="flights.html">
            <button>Search Flights</button>
        </a> 
        <a href="accoms.html">
            <button>Search Accomodation</button>
        </a> 
        
        <br><br>

        <div style="border: 2px solid #ccc; padding: 20px; border-radius: 8px;">
            <h3>Plan Your Full Trip Package</h3>
            <input type="text" id="origin" placeholder="From (Airport Code)">
            <input type="text" id="destination" placeholder="To (Destination Code)">
            <br><br>
            <label>Dates:</label>
            <input type="date" id="departureDate">
            <input type="date" id="returnDate">
            <br><br>
            <input type="number" id="adults" value="1" style="width: 50px;"> Adults
            <input type="number" id="children" value="0" style="width: 50px;"> Children
            <input type="number" id="infants" value="0" style="width: 50px;"> Infants
            <select id="minRating">
                <option value="0">Min Hotel Rating</option>
                <option value="3">3 Stars</option>
                <option value="4">4 Stars</option>
                <option value="5">5 Stars</option>
            </select>
            <br><br>
            <button onclick="executeCombinationSearch()">Search Package</button>
        </div>

        <div id="results-display-area" style="display: flex; margin-top: 20px;">
            <div style="flex: 1;">
                <h4>Flights</h4>
                <div id="flight-list-display"></div>
            </div>
            <div style="flex: 1;">
                <h4>Accommodations</h4>
                <div id="accom-list-display"></div>
            </div>
        </div>

        <br><br>
        <table border="1">
            <tr>
                <th>Saved Trips:</th>
            </tr>
        </table> 
        <br> 
        <a href="booking_page.html">
            <button>Compare and View Bookings</button>
        </a>

        <script src="project.js"></script>
    </body>
</html>

</html>
